name: Shelf Sync - All Books to Notion

on:
  schedule:
    # 每天北京时间 01:00 运行（UTC 17:00）
    - cron: '0 17 * * *'
  workflow_dispatch:
    inputs:
      sync_notion:
        description: 'Sync to Notion'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: weread-shelf-sync
  cancel-in-progress: false

jobs:
  shelf-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check secrets
      run: |
        if [ -z "${{ secrets.WEREAD_API_KEY }}" ]; then
          echo "Error: WEREAD_API_KEY is not set"
          exit 1
        fi
        if [ -z "${{ secrets.NOTION_API_KEY }}" ]; then
          echo "Error: NOTION_API_KEY is not set"
          exit 1
        fi
        if [ -z "${{ secrets.NOTION_DATABASE_ID }}" ]; then
          echo "Error: NOTION_DATABASE_ID is not set"
          exit 1
        fi

    - name: Run shelf sync
      env:
        WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        GITHUB_REPOSITORY: ${{ github.repository }}
      run: |
        echo "Starting shelf sync (all books)..."
        SYNC_ARGS="--mode shelf"
        if [ "${{ inputs.sync_notion }}" = "false" ]; then
          SYNC_ARGS="$SYNC_ARGS --no-notion"
        fi
        python scripts/sync.py $SYNC_ARGS

    - name: Commit and push changes
      if: success()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        CHANGES=$(git diff --cached --stat)
        if [ -n "$CHANGES" ]; then
          BOOK_COUNT=$(echo "$CHANGES" | grep -c "covers/" || true)
          git commit -m "Shelf sync: $(date +'%Y-%m-%d %H:%M:%S') ($BOOK_COUNT covers)"
          git push
        else
          echo "No changes to commit"
        fi
