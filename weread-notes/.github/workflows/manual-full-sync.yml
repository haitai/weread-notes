name: Manual Full Sync - WeRead Backup

on:
  workflow_dispatch:  # 仅手动触发

concurrency:
  group: weread-sync
  cancel-in-progress: false

jobs:
  full-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check secrets
      run: |
        if [ -z "${{ secrets.WEREAD_API_KEY }}" ]; then
          echo "Error: WEREAD_API_KEY is not set"
          exit 1
        fi
        if [ -z "${{ secrets.NOTION_API_KEY }}" ]; then
          echo "Error: NOTION_API_KEY is not set"
          exit 1
        fi
        if [ -z "${{ secrets.NOTION_DATABASE_ID }}" ]; then
          echo "Error: NOTION_DATABASE_ID is not set"
          exit 1
        fi

    - name: Run full sync
      env:
        WEREAD_API_KEY: ${{ secrets.WEREAD_API_KEY }}
        NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      run: |
        echo "Starting full sync..."
        python scripts/sync.py --mode full

    - name: Commit and push changes
      if: success()
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git commit -m "Manual full sync: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
        git push
